<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Global Video Engine Control Panel</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .container { max-width: 500px; margin: 0 auto; }
    input, select, button { margin: 10px 0; padding: 10px; width: 100%; box-sizing: border-box; }
    button { background-color: #007bff; color: white; border: none; cursor: pointer; font-size: 16px; }
    button:hover { background-color: #0056b3; }
    button:disabled { background-color: #cccccc; cursor: not-allowed; }
    #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 4px; min-height: 100px; background-color: #f9f9f9; }
    video { max-width: 100%; margin-top: 15px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .status.processing { background-color: #fff3cd; border: 1px solid #ffeaa7; color: #856404; }
    .status.completed { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
    .status.failed { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    .status.idle { background-color: #e2e3e5; border: 1px solid #d6d8db; color: #383d41; }
  </style>
</head>
<body>
  <div id="root" class="container">
    <h1>Global Video Engine Control Panel</h1>
    <div id="app"></div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function ControlPanel() {
      const [region, setRegion] = useState('US');
      const [language, setLanguage] = useState('en');
      const [jobId, setJobId] = useState(null);
      const [status, setStatus] = useState('idle'); // idle, processing, completed, failed
      const [videoUrl, setVideoUrl] = useState(null);
      const [error, setError] = useState(null);
      const [polling, setPolling] = useState(false);

      const handleGenerate = async () => {
        // Validate inputs
        if (!region || !language) {
          setError('Please select both region and language');
          return;
        }

        try {
          setStatus('processing');
          setError(null);
          setVideoUrl(null);
          
          const response = await fetch('http://localhost:3000/generate-video', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              prompt: 'Create a promotional video for a new product', // Hardcoded prompt for demo
              region,
              language,
            }),
          });

          if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || `HTTP error! status: ${response.status}`);
          }

          const data = await response.json();
          setJobId(data.jobId);
          // Start polling for status
          setPolling(true);
        } catch (err) {
          setError(err.message);
          setStatus('failed');
        }
      };

      useEffect(() => {
        if (!jobId || !polling) return;

        const interval = setInterval(async () => {
          try {
            const response = await fetch(`http://localhost:3000/job/${jobId}`);
            if (!response.ok) {
              throw new Error(`HTTP error! status: ${response.status}`);
            }
            const data = await response.json();
            
            setStatus(data.status);
            
            if (data.status === 'completed') {
              setVideoUrl(data.videoUrl);
              clearInterval(interval);
              setPolling(false);
            } else if (data.status === 'failed') {
              setError(data.error || 'Unknown error');
              setStatus('failed');
              clearInterval(interval);
              setPolling(false);
            }
          } catch (err) {
            setError(err.message);
            setStatus('failed');
            clearInterval(interval);
            setPolling(false);
          }
        }, 5000); // Poll every 5 seconds

        return () => clearInterval(interval);
      }, [jobId, polling]);

      return (
        <div>
          <h2>Create a Localized Video</h2>
          <div>
            <label>
              Region:
              <select value={region} onChange={(e) => setRegion(e.target.value)}>
                <option value="US">United States (US)</option>
                <option value="EU">Europe (EU)</option>
                <option value="JP">Japan (JP)</option>
                <option value="AU">Australia (AU)</option>
                <option value="UK">United Kingdom (UK)</option>
                <option value="CA">Canada (CA)</option>
              </select>
            </label>
          </div>
          <div>
            <label>
              Language:
              <select value={language} onChange={(e) => setLanguage(e.target.value)}>
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="ja">Japanese</option>
              </select>
            </label>
          </div>
          <button onClick={handleGenerate} disabled={status === 'processing'}>
            {status === 'processing' ? 'Generating Video...' : 'Generate Video'}
          </button>
          {error && (
            <div class="status failed">
              <strong>Error:</strong> {error}
            </div>
          )}
          {!error && status !== 'idle' && (
            <div className={`status ${status.toLowerCase()}`}>
              <strong>Status:</strong> {status.charAt(0).toUpperCase() + status.slice(1)}
            </div>
          )}
          {status === 'completed' && videoUrl && (
            <div>
              <h3>Generated Video:</h3>
              <video controls autoPlay muted>
                <source src={videoUrl} type="video/mp4" />
                Your browser does not support the video tag.
              </video>
              <p><small>Video URL: {videoUrl}</small></p>
            </div>
          )}
          {status === 'idle' && (
            <div id="result">
              <p>Select your target region and language, then click "Generate Video" to create a localized promotional video.</p>
              <p>The video will be generated asynchronously and displayed here when ready.</p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(<ControlPanel />);
  </script>
</body>
</html>
