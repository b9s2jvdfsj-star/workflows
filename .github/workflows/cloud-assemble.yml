name: Pure-Cloud Render
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  assemble:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          choco install ffmpeg -y --no-progress

      - name: Run Render Pipeline
        run: |
          $env:NODE_OPTIONS = "--max-old-space-size=4096"
          $env:REMOTION_CODEC = "h264"
          node render-with-node.js
        shell: pwsh

      - name: Upload Final Video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-output
          path: output/
          retention-days: 7
