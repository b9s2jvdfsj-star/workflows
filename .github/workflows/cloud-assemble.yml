name: Pure-Cloud Render
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  assemble:
    runs-on: windows-latest
    timeout-minutes: 180  # Set to 180

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci
          choco install ffmpeg -y --no-progress

      - name: Run Render Pipeline
        env:
          NODE_OPTIONS: "--max-old-space-size=3072"
          REMOTION_CODEC: "h264"
        run: |
          Write-Host "Node Version:"
          node -v
          Write-Host "Starting Render..."
          node ./render-with-node.js
        shell: pwsh

      - name: Upload Final Video
        uses: actions/upload-artifact@v4
        with:
          name: rendered-output
          path: output/
          retention-days: 7