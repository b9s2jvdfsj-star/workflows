name: Trigger Kaggle Render

on:
  workflow_dispatch:
    inputs:
      run-notebook:
        description: 'Run the Kaggle notebook (requires KAGGLE_USERNAME and KAGGLE_KEY secrets)'
        required: false
        default: 'false'

jobs:
  setup-kaggle:
    runs-on: ubuntu-latest
    if: github.event.inputs.run-notebook == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kaggle API
        uses: Kaggle/kaggle-action@v1.0.0
        with:
          kaggle-username: ${{ secrets.KAGGLE_USERNAME }}
          kaggle-key: ${{ secrets.KAGGLE_KEY }}

      - name: List files in repository
        run: |
          ls -la
          echo "---"
          ls -la kaggle_render.ipynb

      - name: Push notebook to Kaggle (as a kernel)
        run: |
          # Create a metadata file for the kernel
          cat > kernel-metadata.json << 'EOF'
          {
            "id": "your-username/global-video-engine-render",
            "title": "Global Video Engine Render",
            "code_file": "kaggle_render.ipynb",
            "language": {
              "name": "python",
              "version": "3.10.0"
            },
            "kernel_type": "notebook",
            "is_private": true,
            "enable_gpu": true,
            "enable_internet": true,
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": []
          }
          EOF

          # Replace with your actual Kaggle username
          # You'll need to set KAGGLE_USERNAME secret to your username
          # The kernel will be uploaded to your Kaggle account
          !kaggle kernels push -p . -u ${{ secrets.KAGGLE_USERNAME }}

      - name: Start kernel execution
        if: false  # Set to true when you want to auto-run
        run: |
          # Note: Auto-running kernels requires the kernel to already exist
          # You typically need to run this manually in Kaggle UI after pushing
          echo "To run the kernel:"
          echo "1. Go to https://www.kaggle.com/${{ secrets.KAGGLE_USERNAME }}/"
          echo "2. Find the 'global-video-engine-render' kernel"
          echo "3. Click 'Run' to execute with GPU"
          echo "4. Monitor progress in the Kaggle UI"

  prepare-only:
    runs-on: ubuntu-latest
    if: github.event.inputs.run-notebook != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare for Kaggle execution
        run: |
          echo "📋 Global Video Engine - Kaggle Setup Complete"
          echo ""
          echo "📁 Repository files:"
          ls -la
          echo ""
          echo "📓 Kaggle notebook prepared:"
          ls -la kaggle_render.ipynb
          echo ""
          echo "🚀 To run on Kaggle:"
          echo "1. Go to https://www.kaggle.com/code"
          echo "2. Click 'New Notebook'"
          echo "3. Upload this repository (or just the kaggle_render.ipynb file)"
          echo "4. Add your secrets:"
          echo "   - MUSE_TALK_API_KEY"
          echo "   - LIVE_PORTRAIT_KEY"
          echo "   - (Optional) KAGGLE_USERNAME and KAGGLE_KEY for API access"
          echo "5. Execute the notebook cells in order"
          echo "6. Ensure GPU is enabled in Settings → Accelerator"
          echo ""
          echo "💡 For automated execution:"
          echo "   - Set up KAGGLE_USERNAME and KAGGLE_KEY secrets in this repo"
          echo "   - Re-run this workflow with 'run-notebook' set to 'true'"
          echo "   - This will push the notebook to your Kaggle account"
          echo "   - You'll still need to click 'Run' in the Kaggle UI"
